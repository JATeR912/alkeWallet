<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="index.html">Alke Wallet</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
            <ul class="navbar-nav mr-0">
                <li class="nav-item active">
                    <a class="nav-link" href="index.html">Inicio<span class="sr-only">(current)</span></a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="flex-fill">
        <section class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h1 class="text-center mb-4 h3 font-weight-bold">Iniciar Sesión</h1>
                            <form id="form-login">
                                <div class="form-group">
                                    <label for="login-email">Correo electrónico</label>
                                    <input type="email" class="form-control" id="login-email" placeholder="nombre@correo.com" required>
                                </div>
                                <div class="form-group mb-4">
                                    <label for="login-password">Contraseña</label>
                                    <input type="password" class="form-control" id="login-password" placeholder="Ingresa tu clave" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 mb-3">
                                    Ingresar
                                </button>
                                <button type="button" class="btn btn-outline-primary w-100" data-toggle="modal" data-target="#modalRegistro">
                                    Crear cuenta
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="modalRegistro" tabindex="-1" aria-labelledby="modalRegistroLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title font-weight-bold" id="modalRegistroLabel">Crear Nueva Cuenta</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <form id="form-registro">
                        <div class="form-group">
                            <label for="registro-email">Correo electrónico</label>
                            <input type="email" class="form-control" id="registro-email" placeholder="ejemplo@correo.com" required>
                        </div>
                        <div class="form-group">
                            <label for="registro-password">Contraseña</label>
                            <input type="password" class="form-control" id="registro-password" placeholder="Crea una contraseña segura" required>
                        </div>
                        <div class="form-group">
                            <label for="registro-pin">PIN de transferencias (4 dígitos)</label>
                            <input type="password" class="form-control" id="registro-pin" placeholder="Ej: 1234" maxlength="4" pattern="\d{4}" required>
                        </div>
                        <button type="submit" id="usuario-nuevo" class="btn btn-primary w-100 mt-2">
                            Registrar Cuenta
                        </button>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary w-100" data-dismiss="modal">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light text-center py-3">
        <small class="text-muted">@AlkeWallet 2026</small>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
    <script src="assets/js/scripts.js"></script>
</body>
</html>
