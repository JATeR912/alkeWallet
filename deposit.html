<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="menu.html">Alke Wallet</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="menu.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="transactions.html">Movimientos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger btn-cerrar-sesion" href="#">Cerrar sesión</a>
                </li>
            </ul>
        </div>
    </nav>

    <section class="container mt-5 flex-grow-1">
        <div class="row">
            <div class="col-12 col-md-6 mx-auto">
                <h1 class="text-muted font-weight-bold mb-4 titulo-wallet">Depositar fondos</h1>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form id="form-deposito">
                            <div class="form-group mb-4">
                                <label for="monto-deposito" class="form-label font-weight-bold">Monto a depositar</label>
                                <input type="number" class="form-control form-control-lg" id="monto-deposito" placeholder="Ej: 5000" min="1" required>
                            </div>
                            
                            <button type="submit" class="btn btn-warning w-100 font-weight-bold py-2">
                                Realizar depósito
                            </button>
                        </form>
                    </div>
                </div>
                
                <div class="mt-3 text-center">
                    <a href="menu.html" class="btn btn-link">← Volver al Menú Principal</a>
                </div>
            </div>
        </div>
    </section>
    <div class="modal fade" id="modalConfirmarDeposito" tabindex="-1" aria-labelledby="modalConfirmarLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title font-weight-bold" id="modalConfirmarLabel">🔒 Autorizar Depósito</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body p-4">
                    <p class="mb-3">Estás a punto de realizar un depósito en tu cuenta:</p>
                    <ul class="list-group list-group-flush mb-4">
                        <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                            <span>Cuenta Destino:</span>
                            <strong id="confirmar-correo" class="text-muted"></strong>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                            <span>Monto a abonar:</span>
                            <strong id="confirmar-monto" class="text-success h5 mb-0 font-weight-bold"></strong>
                        </li>
                    </ul>
                    
                    <div class="form-group">
                        <label for="pin-deposito" class="font-weight-bold">Ingresa tu PIN secreto (4 dígitos)</label>
                        <input type="password" class="form-control text-center form-control-lg" id="pin-deposito" maxlength="4" placeholder="••••" required>
                        <small class="form-text text-danger text-center d-none" id="error-pin-modal">El PIN ingresado es incorrecto.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
                    <button type="button" id="btn-autorizar-deposito" class="btn btn-warning font-weight-bold">Confirmar Depósito</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light text-center py-3 mt-auto">
        <small class="text-muted">@AlkeWallet 2026</small>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
    <script src="./assets/js/scripts.js"></script>
</body>
</html>
