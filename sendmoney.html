<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Transferir</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <a class="navbar-brand" href="menu.html">Alke Wallet</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item">
                    <a class="nav-link" href="menu.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="transactions.html">Movimientos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger btn-cerrar-sesion" href="#">Cerrar sesión</a>
                </li>
            </ul>
        </div>
    </nav>

    <section class="container mt-5 flex-grow-1">
        <div class="row">
            <div class="col-12 col-md-6 mx-auto">
                
                <h1 class="text-muted font-weight-bold mb-4"">Transferir Dinero</h1>
                
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <form id="form-transferencia">
                            <div class="form-group">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label class="mb-0 font-weight-bold text-muted" for="buscar-contacto">Seleccionar Destinatario</label>
                                    <button class="btn btn-outline-primary btn-sm font-weight-bold" type="button" data-toggle="modal" data-target="#modalNuevoContacto">
                                        ➕ Nuevo Contacto
                                    </button>
                                </div>
                                <input type="text" class="form-control" id="buscar-contacto" placeholder="🔍 Buscar por nombre...">
                                
                                <p class="text-muted small mt-3 mb-2 font-weight-bold">Agenda de contactos</p>
                                <div class="list-group mb-3 agenda-scroll" id="lista-contactos-agenda">
                                </div>
                                <input type="hidden" id="cuenta-seleccionada" required>
                            </div>
                            
                            <div class="form-group mb-4">
                                <label for="monto-transferir" class="font-weight-bold text-muted">Monto a transferir</label>
                                <input type="number" class="form-control form-control-lg" id="monto-transferir" placeholder="Ej: 3500" min="1" required>
                            </div>

                            <button type="submit" class="btn btn-success w-100 font-weight-bold py-2">
                                Continuar transferencia
                            </button>       
                        </form>
                    </div>
                </div>
                
                <div class="mt-3 text-center">
                    <a href="menu.html" class="btn btn-link">← Volver al Menú Principal</a>
                </div>
            </div>
        </div>
    </section>

    <div class="modal fade" id="modalNuevoContacto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title font-weight-bold">👤 Agregar Contacto a la Agenda</h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-nuevo-contacto">
                        <div class="form-group">
                            <label for="nombre-contacto" class="font-weight-bold text-muted">Nombre completo</label>
                            <input type="text" class="form-control" id="nombre-contacto" placeholder="Ej: Juan Pérez" required>
                        </div>
                        <div class="form-group mb-4">
                            <label for="numero-cuenta-contacto" class="font-weight-bold text-muted">Número de Cuenta</label>
                            <input type="text" class="form-control" id="numero-cuenta-contacto" placeholder="Ej: 12345678" minlength="8" maxlength="10" pattern="\d*" title="Por favor, ingresa solo números (entre 8 y 10 dígitos)" required>
                        </div>
                        <button type="submit" id="guardar-contacto" class="btn btn-primary w-100 font-weight-bold py-2">
                            Guardar en Agenda
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalConfirmarPin" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title font-weight-bold">🔒 Autorizar Transferencia</h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body p-4">
                    <form id="form-confirmar-pin">
                        <p class="text-center text-muted">Ingresa tu PIN de seguridad de 4 dígitos para transferir.</p>
                        <div class="form-group">
                            <input type="password" class="form-control text-center form-control-lg" id="pin-seguridad" maxlength="4" placeholder="••••" required>
                            <small class="form-text text-danger text-center d-none" id="error-pin-transferencia">El PIN ingresado es incorrecto.</small>
                        </div>
                        <button type="submit" id="btn-confirmar-envio" class="btn btn-success w-100 font-weight-bold py-2">
                            Confirmar Envío
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light text-center py-3 mt-auto">
        <small class="text-muted">@AlkeWallet 2026</small>
    </footer>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
    <script src="./assets/js/scripts.js"></script>
</body>
</html>
